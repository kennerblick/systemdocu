<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>systemdocu</title>
<link rel="stylesheet" href="/vendor/fa-all.min.css"/>
<script src="/vendor/vis-network.min.js"></script>
<link rel="stylesheet" href="/vendor/vis-network.min.css"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#1a1a2e;color:#e0e0e0;display:flex;flex-direction:column;height:100vh}
  #topbar{background:#16213e;padding:10px 16px;display:flex;gap:8px;align-items:center;border-bottom:1px solid #0f3460;flex-shrink:0;flex-wrap:wrap}
  #topbar h1{font-size:1.1rem;color:#e94560;margin-right:auto;letter-spacing:1px}
  button{background:#0f3460;color:#e0e0e0;border:none;padding:7px 14px;border-radius:5px;cursor:pointer;font-size:0.85rem}
  button:hover{background:#e94560}
  button.danger{background:#7f1d1d}
  button.danger:hover{background:#ef4444}
  button.small{padding:3px 8px;font-size:0.75rem}
  button.xs{padding:1px 6px;font-size:0.7rem}
  select,input[type=text],input[type=number],input[type=color],textarea{background:#0f3460;color:#e0e0e0;border:1px solid #1d4ed8;border-radius:4px;padding:5px 8px;font-size:0.85rem}
  select{cursor:pointer}
  #main{display:flex;flex:1;overflow:hidden}
  #graph{flex:1;background:#1a1a2e;position:relative}
  #graph-legend{position:absolute;top:10px;right:10px;z-index:10;background:rgba(22,33,62,0.93);border:1px solid #0f3460;border-radius:7px;padding:10px 14px;font-size:0.76rem;color:#9ca3af;pointer-events:none;min-width:130px;display:none}
  #graph-legend .leg-title{font-size:0.68rem;text-transform:uppercase;letter-spacing:1px;color:#4b5563;margin-bottom:7px}
  #graph-legend .leg-row{display:flex;align-items:center;gap:7px;margin-bottom:4px;color:#d1d5db}
  #graph-legend .leg-dot{width:11px;height:11px;border-radius:2px;flex-shrink:0}
  #sidebar{width:360px;background:#16213e;border-left:1px solid #0f3460;overflow-y:auto;padding:14px;display:none;flex-direction:column;gap:10px}
  #sidebar.open{display:flex}
  #sidebar h2{font-size:1rem;color:#e94560;border-bottom:1px solid #0f3460;padding-bottom:6px}
  .meta-row{font-size:0.82rem;color:#9ca3af}
  .meta-row span{color:#e0e0e0}
  .section-label{font-size:0.75rem;color:#6b7280;text-transform:uppercase;letter-spacing:1px;margin-top:6px}
  .chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:0.75rem;color:#fff;cursor:pointer;user-select:none}
  .chip:hover{opacity:0.75}
  .chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
  .modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center}
  .modal-backdrop.open{display:flex}
  .modal{background:#16213e;border:1px solid #0f3460;border-radius:8px;padding:20px;min-width:340px;max-width:520px;width:100%;display:flex;flex-direction:column;gap:12px;max-height:90vh;overflow-y:auto}
  .modal h3{color:#e94560;font-size:1rem}
  .modal-row{display:flex;flex-direction:column;gap:4px}
  .modal-row label{font-size:0.78rem;color:#9ca3af}
  .modal-row input,.modal-row select,.modal-row textarea{width:100%}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end}
  .list-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #0f3460}
  .dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
  #filter-bar{display:flex;align-items:center;gap:6px}
  #filter-bar label{font-size:0.82rem;color:#9ca3af}
  .svc-block{background:#0f1b35;border-radius:6px;padding:8px;margin-top:4px}
  .svc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .svc-title{font-size:0.82rem;font-weight:600;color:#93c5fd}
  .instance-row{display:flex;flex-direction:column;gap:3px;padding:5px 0;border-top:1px solid #1e3a5f}
  .instance-name{font-size:0.8rem;color:#e0e0e0;font-weight:500}
  .instance-chips{display:flex;flex-wrap:wrap;gap:3px;margin-top:2px}
  .add-instance-form{display:flex;gap:5px;align-items:center;margin-top:6px;padding-top:6px;border-top:1px solid #1e3a5f}
  .add-instance-form input{flex:1;font-size:0.78rem;padding:3px 6px}
  .assign-row{display:flex;gap:5px;align-items:center;margin-top:4px}
  .assign-row select{flex:1;font-size:0.75rem;padding:2px 4px}
  .svc-postgresql .svc-title{color:#93c5fd}
  .badge{padding:2px 8px;border-radius:10px;font-size:0.75rem;font-weight:600;color:#fff}
  .svc-postgresql{background:#1e3a5f}
  .svc-docker .svc-title{color:#7dd3fc}
  .svc-kubernetes .svc-title{color:#818cf8}
</style>
</head>
<body>

<div id="topbar">
  <h1><i class="fa-solid fa-network-wired"></i> systemdocu</h1>
  <div id="filter-bar">
    <label>Tag:</label>
    <select id="tag-filter"><option value="">Alle</option></select>
    <label>Umgebung:</label>
    <select id="env-filter"><option value="">Alle</option></select>
    <label>Anwendung:</label>
    <select id="app-filter"><option value="">Alle</option></select>
  </div>
  <button onclick="openAddServer()"><i class="fa-solid fa-plus"></i> Server</button>
  <button onclick="openManageTags()"><i class="fa-solid fa-tags"></i> Tags</button>
  <button onclick="openManageEnvironments()"><i class="fa-solid fa-layer-group"></i> Umgebungen</button>
  <button onclick="openManageApplications()"><i class="fa-solid fa-cubes"></i> Anwendungen</button>
  <button id="zbx-btn" onclick="openZabbixScan()"><i class="fa-solid fa-radar"></i> Scan Zabbix</button>
  <button onclick="exportJson()"><i class="fa-solid fa-download"></i> Export</button>
</div>

<div id="main">
  <div id="graph"></div>

  <div id="sidebar">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h2 id="sb-hostname"></h2>
      <div style="display:flex;gap:5px">
        <button class="small" onclick="toggleServerEdit()"><i class="fa-solid fa-pen"></i></button>
        <button class="small danger" onclick="deleteCurrentServer()"><i class="fa-solid fa-trash"></i></button>
      </div>
    </div>
    <div class="meta-row">FQDN: <span id="sb-fqdn">—</span></div>
    <div class="meta-row">IP: <span id="sb-ip">—</span></div>
    <div class="meta-row">OS: <span id="sb-os"></span></div>
    <div class="meta-row">Beschreibung: <span id="sb-desc">—</span></div>
    <div id="sb-edit-form" style="display:none;flex-direction:column;gap:6px;background:#0f1b35;padding:10px;border-radius:6px">
      <div class="modal-row"><label>Hostname</label><input type="text" id="edit-hostname"/></div>
      <div class="modal-row"><label>FQDN</label><input type="text" id="edit-fqdn"/></div>
      <div class="modal-row"><label>IP</label><input type="text" id="edit-ip"/></div>
      <div class="modal-row"><label>OS-Typ</label>
        <select id="edit-os">
          <option value="linux">Linux</option>
          <option value="windows">Windows</option>
          <option value="proxmox">Proxmox</option>
          <option value="esxi">ESXi</option>
        </select>
      </div>
      <div class="modal-row"><label>Beschreibung</label><textarea id="edit-desc" rows="2" style="width:100%"></textarea></div>
      <button class="small" onclick="saveServerEdit()"><i class="fa-solid fa-floppy-disk"></i> Speichern</button>
    </div>

    <div class="section-label">Services &amp; Instanzen</div>
    <div id="sb-services"></div>
    <button class="small" style="margin-top:4px" onclick="toggleAddService()"><i class="fa-solid fa-plus"></i> Service hinzufügen</button>
    <div id="add-service-form" style="display:none;flex-direction:column;gap:6px;background:#0f1b35;padding:10px;border-radius:6px;margin-top:4px">
      <div style="display:flex;gap:6px;align-items:center">
        <select id="svc-type">
          <option value="postgresql">PostgreSQL</option>
          <option value="docker">Docker</option>
          <option value="kubernetes">Kubernetes</option>
          <option value="hyperv">Hyper-V</option>
          <option value="samba">Samba</option>
          <option value="sftp">SFTP</option>
          <option value="freeipa">FreeIPA</option>
          <option value="zabbix">Zabbix</option>
          <option value="graylog">Graylog</option>
          <option value="veeam">Veeam</option>
          <option value="minio">MinIO</option>
        </select>
        <input type="text" id="svc-version" placeholder="Version" style="width:80px"/>
        <input type="number" id="svc-port" placeholder="Port" style="width:70px"/>
      </div>
      <button class="small" onclick="addService()">Speichern</button>
    </div>

    <div class="section-label">Umgebungen</div>
    <div class="chips" id="sb-envs"></div>
    <div style="display:flex;gap:6px;align-items:center;margin-top:4px">
      <select id="env-select" style="flex:1"></select>
      <button class="small" onclick="assignServerEnv()">Hinzufügen</button>
    </div>

    <div class="section-label">Tags</div>
    <div class="chips" id="sb-tags"></div>
    <div style="display:flex;gap:6px;align-items:center;margin-top:4px">
      <select id="tag-select" style="flex:1"></select>
      <button class="small" onclick="assignTag()">Hinzufügen</button>
    </div>

    <div class="section-label">Server-Relation</div>
    <div style="display:flex;gap:6px;align-items:center">
      <select id="rel-target" style="flex:1"></select>
      <select id="rel-type" style="width:120px">
        <option value="connects_to">connects_to</option>
        <option value="hosts">hosts</option>
        <option value="depends_on">depends_on</option>
      </select>
      <button class="small" onclick="addRelation()">+</button>
    </div>

    <div class="section-label">Instanz-Relationen</div>
    <div id="sb-inst-rels"></div>
    <div style="display:flex;flex-direction:column;gap:4px;background:#0f1b35;padding:8px;border-radius:6px;margin-top:4px">
      <div style="display:flex;gap:4px">
        <select id="ir-src" style="flex:1;font-size:0.78rem"></select>
        <select id="ir-reltype" style="width:105px;font-size:0.78rem">
          <option value="connects_to">connects_to</option>
          <option value="uses">uses</option>
          <option value="depends_on">depends_on</option>
          <option value="hosts">hosts</option>
        </select>
      </div>
      <div style="display:flex;gap:4px">
        <select id="ir-tgt-srv" style="flex:1;font-size:0.78rem" onchange="updateIrTgtInst()"></select>
        <select id="ir-tgt" style="flex:1;font-size:0.78rem"></select>
        <button class="xs" onclick="addInstRel()">+</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal: Server hinzufügen -->
<div class="modal-backdrop" id="modal-add-server">
  <div class="modal">
    <h3>Server hinzufügen</h3>
    <div class="modal-row"><label>Hostname *</label><input type="text" id="new-hostname"/></div>
    <div class="modal-row"><label>FQDN</label><input type="text" id="new-fqdn"/></div>
    <div class="modal-row"><label>IP</label><input type="text" id="new-ip"/></div>
    <div class="modal-row"><label>OS-Typ</label>
      <select id="new-os">
        <option value="linux">Linux</option>
        <option value="windows">Windows</option>
        <option value="proxmox">Proxmox</option>
        <option value="esxi">ESXi</option>
      </select>
    </div>
    <div class="modal-row"><label>Beschreibung</label><input type="text" id="new-desc"/></div>
    <div class="modal-actions">
      <button onclick="closeModal('modal-add-server')">Abbrechen</button>
      <button onclick="createServer()">Erstellen</button>
    </div>
  </div>
</div>

<!-- Modal: Tags -->
<div class="modal-backdrop" id="modal-tags">
  <div class="modal">
    <h3>Tags verwalten</h3>
    <div id="tag-list"></div>
    <hr style="border-color:#0f3460;margin:8px 0"/>
    <div style="display:flex;gap:8px;align-items:center">
      <input type="text" id="new-tag-name" placeholder="Name" style="flex:1"/>
      <input type="color" id="new-tag-color" value="#3498db" style="width:40px;padding:2px"/>
      <button onclick="createTag()">Erstellen</button>
    </div>
    <div class="modal-actions"><button onclick="closeModal('modal-tags')">Schließen</button></div>
  </div>
</div>

<!-- Modal: Umgebungen -->
<div class="modal-backdrop" id="modal-environments">
  <div class="modal">
    <h3>Umgebungen verwalten</h3>
    <div id="env-list"></div>
    <hr style="border-color:#0f3460;margin:8px 0"/>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <input type="text" id="new-env-name" placeholder="Name" style="flex:1;min-width:100px"/>
      <input type="text" id="new-env-desc" placeholder="Beschreibung" style="flex:2;min-width:120px"/>
      <button onclick="createEnvironment()">Erstellen</button>
    </div>
    <div class="modal-actions"><button onclick="closeModal('modal-environments')">Schließen</button></div>
  </div>
</div>

<!-- Modal: Zabbix Scan -->
<div class="modal-backdrop" id="modal-zabbix">
  <div class="modal" style="max-width:640px">
    <h3><i class="fa-solid fa-radar"></i> Zabbix Scan</h3>
    <div id="zbx-step-hosts">
      <div class="modal-row">
        <label>Host auswählen</label>
        <select id="zbx-host-select" style="width:100%"><option value="">— Lädt… —</option></select>
      </div>
      <div class="modal-actions">
        <button onclick="closeModal('modal-zabbix')">Abbrechen</button>
        <button id="zbx-scan-btn" onclick="runZabbixScan()">Scannen</button>
      </div>
    </div>
    <div id="zbx-step-result" style="display:none">
      <div id="zbx-result-info" style="font-size:0.82rem;color:#9ca3af;margin-bottom:6px"></div>
      <div id="zbx-result-services" style="display:flex;flex-direction:column;gap:6px;max-height:320px;overflow-y:auto"></div>
      <div class="modal-actions" style="margin-top:10px">
        <button onclick="zbxBack()">Zurück</button>
        <button onclick="zbxImport()"><i class="fa-solid fa-file-import"></i> Importieren</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal: Anwendungen -->
<div class="modal-backdrop" id="modal-applications">
  <div class="modal">
    <h3>Anwendungen verwalten</h3>
    <div id="app-list"></div>
    <hr style="border-color:#0f3460;margin:8px 0"/>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <input type="text" id="new-app-name" placeholder="Name" style="flex:1;min-width:100px"/>
      <input type="text" id="new-app-desc" placeholder="Beschreibung" style="flex:2;min-width:120px"/>
      <button onclick="createApplication()">Erstellen</button>
    </div>
    <div class="modal-actions"><button onclick="closeModal('modal-applications')">Schließen</button></div>
  </div>
</div>

<script>
const API = '/api';
let network = null;
let nodes = null;
let edges = null;
let allServers = [];
let allTags = [];
let allRelations = [];
let allEnvironments = [];
let allApplications = [];
let allInstanceRelations = [];
let currentServerId = null;

const OS_COLORS = {
  linux:   '#3b82f6',
  windows: '#60a5fa',
  proxmox: '#f97316',
  esxi:    '#22c55e',
};

const SVC_COLORS = {
  postgresql:'#336791', docker:'#2496ed', kubernetes:'#326ce5',
  hyperv:'#00adef', samba:'#d97706', sftp:'#059669',
  freeipa:'#7c3aed', zabbix:'#e53e3e', graylog:'#2d3748',
  veeam:'#00b050', minio:'#c83b0e',
};

async function api(method, path, body) {
  const opts = {method, headers: {'Content-Type': 'application/json'}};
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  if (!r.ok) throw new Error(await r.text());
  if (r.status === 204) return null;
  return r.json();
}

async function loadAll() {
  try {
    [allServers, allTags, allRelations, allEnvironments, allApplications, allInstanceRelations] = await Promise.all([
      api('GET', '/servers'),
      api('GET', '/tags'),
      api('GET', '/relations'),
      api('GET', '/environments'),
      api('GET', '/applications'),
      api('GET', '/instance-relations'),
    ]);
  } catch (e) {
    console.error('loadAll failed:', e);
    return;
  }
  renderGraph();
  renderLegend();
  updateFilters();
  if (currentServerId) openSidebar(currentServerId);
  checkZabbixStatus();
}

async function checkZabbixStatus() {
  const btn = document.getElementById('zbx-btn');
  btn.title = 'Prüfe Verbindung…';
  btn.style.outline = '';
  btn.style.background = '';
  try {
    const r = await fetch('/api/zabbix/ping');
    const data = await r.json();
    if (data.status === 'ok') {
      btn.style.outline = '2px solid #22c55e';
      btn.style.background = '';
      btn.title = data.message;
    } else {
      btn.style.background = '#7f1d1d';
      btn.style.outline = '';
      btn.title = data.message;
    }
  } catch (e) {
    btn.style.background = '#7f1d1d';
    btn.style.outline = '';
    btn.title = 'Verbindungsfehler: ' + e.message;
  }
}

function serverColor(server) {
  if (server.environments && server.environments.length > 0) return server.environments[0].color;
  if (server.tags && server.tags.length > 0) return server.tags[0].color;
  return OS_COLORS[server.os_type] || '#888';
}

function buildNode(server) {
  const col = serverColor(server);
  return {
    id: server.id,
    label: server.hostname,
    shape: 'dot',
    size: 18,
    color: {background: col, border: col, highlight: {background: col, border: '#fff'}},
    font: {color: '#e0e0e0', size: 13},
    title: '[' + server.os_type + '] ' + server.hostname + (server.ip ? ' (' + server.ip + ')' : ''),
  };
}

const INST_ZOOM_THRESHOLD = 0.65;
let showingInstances = false;

const INST_ICONS = {
  postgresql: '🗄', docker: '🐳', kubernetes: '☸', hyperv: '🖥',
  samba: '📁', sftp: '📂', freeipa: '🔑', zabbix: '📊',
  graylog: '📝', veeam: '💾', minio: '🪣',
};

function buildInstServerMap() {
  const map = {};
  allServers.forEach(s => {
    (s.services || []).forEach(svc => {
      (svc.instances || []).forEach(inst => {
        map[inst.id] = {serverId: s.id, name: inst.name, svcType: svc.type};
      });
    });
  });
  return map;
}

function buildInstanceNodesEdges() {
  const instNodes = [], siEdges = [], irInstEdges = [];
  const im = buildInstServerMap();
  allServers.forEach(s => {
    (s.services || []).forEach(svc => {
      const col = SVC_COLORS[svc.type] || '#4b5563';
      (svc.instances || []).forEach(inst => {
        instNodes.push({
          id: 'inst_' + inst.id,
          label: (INST_ICONS[svc.type] || '⚙') + ' ' + inst.name,
          shape: 'box',
          color: {background: col + 'bb', border: col, highlight: {background: col, border: '#fff'}},
          font: {color: '#f0f0f0', size: 11},
          margin: {top: 5, bottom: 5, left: 7, right: 7},
          borderWidth: 1,
        });
        siEdges.push({
          id: 'si_' + inst.id, from: s.id, to: 'inst_' + inst.id,
          color: {color: col, opacity: 0.45}, width: 1, dashes: [3, 6], arrows: '',
        });
      });
    });
  });
  const im = buildInstServerMap();
  allInstanceRelations.forEach(r => {
    const src = im[r.source_instance_id];
    const tgt = im[r.target_instance_id];
    const srcSrv = allServers.find(s => s.id === (src && src.serverId));
    const tgtSrv = allServers.find(s => s.id === (tgt && tgt.serverId));
    irInstEdges.push({
      id: 'ir_inst_' + r.id,
      from: 'inst_' + r.source_instance_id, to: 'inst_' + r.target_instance_id,
      arrows: 'to', width: 2,
      color: {color: '#7c3aed'},
      title: (src ? src.name : '?') + ' (' + (srcSrv ? srcSrv.hostname : '?') + ') → ' +
             (tgt ? tgt.name : '?') + ' (' + (tgtSrv ? tgtSrv.hostname : '?') + ')' +
             '\n' + r.type,
    });
  });
  return {instNodes, siEdges, irInstEdges};
}

function renderGraph() {
  const instMap = buildInstServerMap();
  const nodeData = allServers.map(buildNode);
  const edgeData = [];

  allRelations.forEach(r => {
    const srcSrv = allServers.find(s => s.id === r.source_id);
    const tgtSrv = allServers.find(s => s.id === r.target_id);
    edgeData.push({
      id: 'sr_' + r.id, from: r.source_id, to: r.target_id,
      arrows: 'to', color: {color: '#4b5563'},
      title: (srcSrv ? srcSrv.hostname : r.source_id) + ' → ' +
             (tgtSrv ? tgtSrv.hostname : r.target_id) + '\n' + r.type,
    });
  });

  // Server-to-server proxy for instance relations (shown when zoomed out)
  allInstanceRelations.forEach(r => {
    const src = instMap[r.source_instance_id];
    const tgt = instMap[r.target_instance_id];
    if (!src || !tgt || src.serverId === tgt.serverId) return;
    const srcSrv = allServers.find(s => s.id === src.serverId);
    const tgtSrv = allServers.find(s => s.id === tgt.serverId);
    edgeData.push({
      id: 'ir_srv_' + r.id, from: src.serverId, to: tgt.serverId,
      arrows: 'to', dashes: true,
      color: {color: '#7c3aed'},
      title: src.name + ' (' + (srcSrv ? srcSrv.hostname : '?') + ') → ' +
             tgt.name + ' (' + (tgtSrv ? tgtSrv.hostname : '?') + ')' +
             '\n' + r.type,
    });
  });

  if (network) {
    showingInstances = false;
    nodes.clear(); nodes.add(nodeData);
    edges.clear(); edges.add(edgeData);
    updateInstanceVisibility(network.getScale());
    return;
  }

  const {DataSet, Network} = vis;
  nodes = new DataSet(nodeData);
  edges = new DataSet(edgeData);
  network = new Network(document.getElementById('graph'), {nodes, edges}, {
    physics: {
      barnesHut: {gravitationalConstant: -3000, centralGravity: 0.3, springLength: 150},
      stabilization: {iterations: 150},
    },
    interaction: {hover: true, tooltipDelay: 200},
    edges: {smooth: {type: 'continuous'}},
  });

  // Attach legend after Network() since it clears the container
  const graphEl = document.getElementById('graph');
  let leg = document.createElement('div'); leg.id = 'graph-legend';
  graphEl.appendChild(leg);
  renderLegend();

  network.on('click', params => {
    if (!params.nodes.length) return closeSidebar();
    const nodeId = params.nodes[0];
    if (typeof nodeId === 'string' && nodeId.startsWith('inst_')) {
      const info = buildInstServerMap()[parseInt(nodeId.replace('inst_', ''))];
      if (info) openSidebar(info.serverId);
    } else {
      openSidebar(nodeId);
    }
  });
  network.on('zoom', () => updateInstanceVisibility(network.getScale()));
  network.on('stabilized', () => updateInstanceVisibility(network.getScale()));
}

function renderLegend() {
  const el = document.getElementById('graph-legend');
  if (!el) return;
  const present = new Map();
  allServers.forEach(s => {
    (s.services || []).forEach(svc => {
      if ((svc.instances || []).length && !present.has(svc.type)) {
        present.set(svc.type, {
          color: SVC_COLORS[svc.type] || '#4b5563',
          icon: INST_ICONS[svc.type] || '⚙',
        });
      }
    });
  });
  if (!present.size) { el.style.display = 'none'; return; }
  el.style.display = '';
  el.innerHTML = '<div class="leg-title">Instanz-Typen</div>' +
    Array.from(present.entries()).map(([type, {color, icon}]) =>
      '<div class="leg-row">' +
      '<span class="leg-dot" style="background:' + color + '"></span>' +
      '<span>' + icon + ' ' + type + '</span></div>'
    ).join('');
}

function updateInstanceVisibility(scale) {
  if (!nodes || !edges || !network) return;
  const show = scale >= INST_ZOOM_THRESHOLD;
  if (show === showingInstances) return;
  showingInstances = show;

  if (show) {
    const {instNodes, siEdges, irInstEdges} = buildInstanceNodesEdges();
    // Safety: remove stale entries first
    nodes.remove(instNodes.map(n => n.id));
    edges.remove(siEdges.map(e => e.id));
    edges.remove(irInstEdges.map(e => e.id));
    nodes.add(instNodes);
    edges.add(siEdges);
    edges.add(irInstEdges);
    // Hide server-proxy edges for instance relations
    allInstanceRelations.forEach(r => {
      if (edges.get('ir_srv_' + r.id)) edges.update({id: 'ir_srv_' + r.id, hidden: true});
    });
  } else {
    const instNodeIds = [], siEdgeIds = [];
    allServers.forEach(s => (s.services || []).forEach(svc => (svc.instances || []).forEach(inst => {
      instNodeIds.push('inst_' + inst.id);
      siEdgeIds.push('si_' + inst.id);
    })));
    nodes.remove(instNodeIds);
    edges.remove(siEdgeIds);
    allInstanceRelations.forEach(r => {
      edges.remove('ir_inst_' + r.id);
      if (edges.get('ir_srv_' + r.id)) edges.update({id: 'ir_srv_' + r.id, hidden: false});
    });
  }

  network.redraw();
  updateZoomHint(show);
}

function updateZoomHint(instancesVisible) {
  let hint = document.getElementById('zoom-hint');
  const hasInstances = allServers.some(s => (s.services || []).some(sv => (sv.instances || []).length));
  if (!hasInstances) { if (hint) hint.remove(); return; }
  if (!hint) {
    hint = document.createElement('div');
    hint.id = 'zoom-hint';
    hint.style.cssText = 'position:absolute;bottom:10px;left:50%;transform:translateX(-50%);' +
      'background:rgba(22,33,62,0.85);border:1px solid #0f3460;border-radius:5px;' +
      'padding:5px 14px;font-size:0.75rem;color:#6b7280;pointer-events:none;z-index:10;white-space:nowrap';
    document.getElementById('graph').appendChild(hint);
  }
  hint.textContent = instancesVisible ? '🔍 Rauszoomen um Instanzen auszublenden' : '🔍 Reinzoomen um Instanzen anzuzeigen';
}

function updateFilters() {

    const sel = document.getElementById(selId);

    sel.innerHTML = '<option value="">Alle</option>';
    items.forEach(it => {
      const o = document.createElement('option');
      o.value = it.id; o.textContent = it[labelKey]; sel.appendChild(o);
    });
    sel.value = cur;
  }
  syncSel('tag-filter', allTags, 'name');
  syncSel('env-filter', allEnvironments, 'name');
  syncSel('app-filter', allApplications, 'name');
}

function applyFilters() {
  if (!nodes) return;
  const tagId = parseInt(document.getElementById('tag-filter').value) || 0;
  const envId = parseInt(document.getElementById('env-filter').value) || 0;
  const appId = parseInt(document.getElementById('app-filter').value) || 0;
  allServers.forEach(s => {
    let vis = true;
    if (tagId && !s.tags.some(t => t.id === tagId)) vis = false;
    if (envId && !(s.environments || []).some(e => e.id === envId)) vis = false;
    if (appId && !s.services.some(sv => sv.instances.some(i => i.applications.some(a => a.id === appId)))) vis = false;
    nodes.update({id: s.id, opacity: vis ? 1 : 0.15});
  });
}

function renderInstRelSection(server, instMap) {
  instMap = instMap || buildInstServerMap();
  const myInstIds = new Set();
  (server.services || []).forEach(svc => (svc.instances || []).forEach(i => myInstIds.add(i.id)));
  const container = document.getElementById('sb-inst-rels');
  container.innerHTML = '';
  const rels = allInstanceRelations.filter(r => myInstIds.has(r.source_instance_id) || myInstIds.has(r.target_instance_id));
  if (!rels.length) {
    container.innerHTML = '<div style="font-size:0.78rem;color:#6b7280">Keine</div>';
    return;
  }
  rels.forEach(r => {
    const src = instMap[r.source_instance_id];
    const tgt = instMap[r.target_instance_id];
    const srcSrv = allServers.find(s => s.id === (src && src.serverId));
    const tgtSrv = allServers.find(s => s.id === (tgt && tgt.serverId));
    const row = document.createElement('div');
    row.className = 'list-item';
    row.style.fontSize = '0.78rem';
    row.innerHTML =
      '<span style="color:#a78bfa;flex:1">' +
      escHtml((src ? src.name : '?') + ' (' + (srcSrv ? srcSrv.hostname : '?') + ')') +
      ' <i class="fa-solid fa-arrow-right" style="font-size:0.65rem"></i> ' +
      escHtml((tgt ? tgt.name : '?') + ' (' + (tgtSrv ? tgtSrv.hostname : '?') + ')') +
      '</span><span style="color:#6b7280;margin:0 6px">' + escHtml(r.type) + '</span>' +
      '<button class="xs danger" onclick="deleteInstRel(' + r.id + ')"><i class="fa-solid fa-xmark"></i></button>';
    container.appendChild(row);
  });
}

  const name = document.getElementById('new-app-name').value.trim();
  const description = document.getElementById('new-app-desc').value || null;
  if (!name) return;
  const color = nextColor(allApplications.map(a => a.color));
  try { await api('POST', '/applications', {name, description, color}); }
  catch (e) { return alert('Fehler: ' + e.message); }
  document.getElementById('new-app-name').value = '';
  document.getElementById('new-app-desc').value = '';
  await loadAll();
  renderAppList();
}

async function deleteApplication(appId) {
  try { await api('DELETE', '/applications/' + appId); }
  catch (e) { return alert('Fehler: ' + e.message); }
  await loadAll();
  renderAppList();
}

const AUTO_COLORS = [
  '#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6',
  '#06b6d4','#84cc16','#f97316','#ec4899','#6366f1',
  '#14b8a6','#eab308','#a855f7','#0ea5e9','#22c55e',
];

function nextColor(usedColors) {
  for (const c of AUTO_COLORS) {
    if (!usedColors.includes(c)) return c;
  }
  return AUTO_COLORS[usedColors.length % AUTO_COLORS.length];
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

let zbxScanData = null;

async function openZabbixScan() {
  zbxScanData = null;
  document.getElementById('zbx-step-hosts').style.display = '';
  document.getElementById('zbx-step-result').style.display = 'none';
  document.getElementById('modal-zabbix').classList.add('open');
  const sel = document.getElementById('zbx-host-select');
  sel.innerHTML = '<option value="">— Lädt… —</option>';
  try {
    const hosts = await api('GET', '/zabbix/hosts');
    sel.innerHTML = '';
    if (!hosts.length) {
      sel.innerHTML = '<option value="">Keine Hosts gefunden</option>';
      return;
    }
    hosts.forEach(h => {
      const o = document.createElement('option');
      o.value = h.hostid;
      o.textContent = h.hostname + (h.ip ? ' (' + h.ip + ')' : '');
      sel.appendChild(o);
    });
  } catch (e) {
    sel.innerHTML = '<option value="">Fehler: ' + escHtml(e.message) + '</option>';
  }
}

async function runZabbixScan() {
  const hostid = document.getElementById('zbx-host-select').value;
  if (!hostid) return alert('Bitte Host auswählen');
  const btn = document.getElementById('zbx-scan-btn');
  btn.disabled = true; btn.textContent = 'Scannt…';
  try {
    zbxScanData = await api('GET', '/zabbix/scan/' + hostid);
  } catch (e) {
    btn.disabled = false; btn.textContent = 'Scannen';
    return alert('Scan fehlgeschlagen: ' + e.message);
  }
  btn.disabled = false; btn.textContent = 'Scannen';
  renderZabbixResult();
}

function renderZabbixResult() {
  if (!zbxScanData) return;
  const d = zbxScanData;
  document.getElementById('zbx-step-hosts').style.display = 'none';
  document.getElementById('zbx-step-result').style.display = '';
  document.getElementById('zbx-result-info').innerHTML =
    '<b>' + escHtml(d.hostname) + '</b>' +
    (d.ip ? ' &nbsp;IP: ' + escHtml(d.ip) : '') +
    (d.fqdn ? ' &nbsp;FQDN: ' + escHtml(d.fqdn) : '') +
    ' &nbsp;OS: ' + escHtml(d.os_type);
  const container = document.getElementById('zbx-result-services');
  container.innerHTML = '';
  if (!d.services || !d.services.length) {
    container.innerHTML = '<div style="color:#6b7280;font-size:0.82rem">Keine Services erkannt</div>';
    return;
  }
  d.services.forEach(svc => {
    const col = SVC_COLORS[svc.type] || '#4b5563';
    const block = document.createElement('div');
    block.className = 'svc-block';
    block.innerHTML = '<div class="svc-title" style="color:' + col + ';margin-bottom:4px">' +
      escHtml(svc.type) + (svc.version ? ' ' + escHtml(svc.version) : '') + '</div>';
    if (svc.instances && svc.instances.length) {
      const ul = document.createElement('div');
      ul.style.cssText = 'display:flex;flex-wrap:wrap;gap:4px;margin-top:2px';
      svc.instances.forEach(name => {
        const chip = document.createElement('span');
        chip.className = 'chip';
        chip.style.background = col;
        chip.textContent = name;
        ul.appendChild(chip);
      });
      block.appendChild(ul);
    } else {
      const note = document.createElement('div');
      note.style.cssText = 'font-size:0.75rem;color:#6b7280';
      note.textContent = 'Keine Instanzen erkannt';
      block.appendChild(note);
    }
    container.appendChild(block);
  });
}

function zbxBack() {
  zbxScanData = null;
  document.getElementById('zbx-step-hosts').style.display = '';
  document.getElementById('zbx-step-result').style.display = 'none';
}

async function zbxImport() {
  if (!zbxScanData) return;
  try {
    const result = await api('POST', '/zabbix/import', zbxScanData);
    alert('Importiert: ' + result.hostname + ' (ID ' + result.server_id + ')');
  } catch (e) {
    return alert('Import fehlgeschlagen: ' + e.message);
  }
  closeModal('modal-zabbix');
  await loadAll();
}

async function exportJson() {
  const data = await api('GET', '/export/json');
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'systemdocu-export.json';
  a.click();
}

document.querySelectorAll('.modal-backdrop').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

loadAll();
</script>
