services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
      ZABBIX_URL: ${ZABBIX_URL:-}
      ZABBIX_USER: ${ZABBIX_USER:-}
      ZABBIX_PASSWORD: ${ZABBIX_PASSWORD:-}
      ZABBIX_API_TOKEN: ${ZABBIX_API_TOKEN:-}
      LOG_DIR: /logs
    volumes:
      - logs_data:/logs
    networks:
      - internal

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "9191:80"
    depends_on:
      - backend
    networks:
      - internal

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/docker/systemdocu/postgres
  logs_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/docker/systemdocu/logs

networks:
  internal:
    driver: bridge
